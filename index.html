<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Numerário</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eee;
      margin: 0;
      padding: 20px;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, select, input {
      padding: 8px;
    }

    #printArea {
      width: 794px;
      background: white;
      margin: auto;
      padding: 12px;
      box-sizing: border-box;
    }

    #glossarioRepasse {
      width: 794px;
      margin: 0 auto 15px auto;
      background: #fff;
      border: 1px solid #999;
      padding: 10px;
      box-sizing: border-box;
      font-size: 12px;
    }

    #glossarioRepasse table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    #glossarioRepasse th {
      background: #000;
      color: #fff;
    }

    .section {
      margin-top: 14px;
      border: 1px solid #999;
    }

    .section-title {
      background: #111;
      color: white;
      font-weight: bold;
      padding: 5px;
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    td, th {
      border: 1px solid #999;
      padding: 4px;
    }

    th {
      background: #eee;
    }

    .right {
      text-align: right;
    }

    .center {
      text-align: center;
    }

    .text-small {
      font-size: 10px;
      line-height: 1.4;
    }

    .linha-total-amarela {
      background: #f2b400;
      margin-top: 5px;
      padding: 5px 10px;
      font-weight: bold;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 4mm;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      html, body {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 0;
        background: white;
      }

      .controls,
      #glossarioRepasse {
        display: none !important;
      }

      #printArea {
        width: 202mm;
        margin: 0 auto;
        padding: 0;
        min-height: auto;
      }

      .section {
        margin-top: 5px;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      table {
        font-size: 8.5px;
      }

      td, th {
        padding: 2px;
      }

      .text-small {
        font-size: 7.5px;
        line-height: 1.15;
      }

      .header-img {
        width: 100% !important;
        height: auto !important;
        max-height: none !important;
        display: block;
      }
    }
  </style>
</head>

<body>

  <div class="controls">
    <input type="file" id="fileInput" accept=".xls,.html,.txt" />

    <select id="tipoRepasse">
      <option value="">Selecione o tipo</option>
      <option value="P1">P1</option>
      <option value="P2">P2+</option>
      <option value="EXTRA">Extra</option>
    </select>

    <input
      type="number"
      id="valorExtra"
      placeholder="Valor extra"
      step="0.01"
      style="display:none;"
    />

    <button onclick="window.print()">Imprimir / Salvar PDF</button>
  </div>

  <div id="glossarioRepasse" style="display:none;"></div>

  <div id="printArea">
    <p>Selecione o arquivo .xls para gerar o template.</p>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const printArea = document.getElementById("printArea");
    const tipoRepasse = document.getElementById("tipoRepasse");
    const valorExtra = document.getElementById("valorExtra");
    const glossarioRepasse = document.getElementById("glossarioRepasse");

    let currentData = null;

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      currentData = await readNumerarioFile(file);
      atualizarGlossario();
      atualizarTemplate();
    });

    tipoRepasse.addEventListener("change", () => {
      valorExtra.style.display = tipoRepasse.value === "EXTRA" ? "inline-block" : "none";
      atualizarGlossario();
      atualizarTemplate();
    });

    valorExtra.addEventListener("input", () => {
      atualizarGlossario();
      atualizarTemplate();
    });

    function atualizarTemplate() {
      if (!currentData) return;

      const dataComRepasse = aplicarRepasse(currentData);
      printArea.innerHTML = renderNumerarioTemplate(dataComRepasse);
    }

    function atualizarGlossario() {
      const tipo = tipoRepasse.value;

      if (!tipo) {
        glossarioRepasse.style.display = "none";
        glossarioRepasse.innerHTML = "";
        return;
      }

      let titulo = "";
      let valores = {};

      if (tipo === "P1") {
        titulo = "Distribuição P1";
        valores = {
          "Despesas Desembaraço": 1534,
          "Armazenagem": 850,
          "Desembaraço Aduaneiro": 850,
          "Taxa de Handling": 3766
        };
      }

      if (tipo === "P2") {
        titulo = "Distribuição P2+";
        valores = {
          "Despesas Desembaraço": 1723,
          "Armazenagem": 270,
          "Desembaraço Aduaneiro": 473,
          "Taxa de Handling": 2534
        };
      }

      if (tipo === "EXTRA") {
        const totalExtra = Number(valorExtra.value || 0);

        titulo = "Distribuição Extra";
        valores = {
          "Despesas Desembaraço": totalExtra * 0.2191428571,
          "Armazenagem": totalExtra * 0.1214285714,
          "Desembaraço Aduaneiro": totalExtra * 0.1214285714,
          "Taxa de Handling": totalExtra * 0.538
        };
      }

      const total = Object.values(valores).reduce((acc, valor) => acc + valor, 0);

      const linhas = Object.entries(valores).map(([descricao, valor]) => `
        <tr>
          <td>${descricao}</td>
          <td class="right">R$ ${numeroParaMoeda(valor)}</td>
        </tr>
      `).join("");

      glossarioRepasse.style.display = "block";
      glossarioRepasse.innerHTML = `
        <b>${titulo}</b>
        <table>
          <tr>
            <th>Descrição</th>
            <th>Valor</th>
          </tr>
          ${linhas}
          <tr>
            <td><b>Total</b></td>
            <td class="right"><b>R$ ${numeroParaMoeda(total)}</b></td>
          </tr>
        </table>
      `;
    }

    async function readNumerarioFile(file) {
  /*
   * O XLS utilizado é um arquivo HTML.
   * A leitura por ArrayBuffer também corrige caracteres especiais.
   */
  const buffer = await file.arrayBuffer();
  const bytes = new Uint8Array(buffer);

  const textoUtf8 = new TextDecoder("utf-8").decode(bytes);

  const charsetInformado =
    textoUtf8.match(/charset\s*=\s*["']?([^"'\s;>]+)/i)?.[1]?.toLowerCase() || "";

  const quantidadeCaracteresInvalidos =
    (textoUtf8.match(/\uFFFD/g) || []).length;

  const usarWindows1252 =
    charsetInformado.includes("1252") ||
    charsetInformado.includes("8859-1") ||
    quantidadeCaracteresInvalidos > 1;

  const html = usarWindows1252
    ? new TextDecoder("windows-1252").decode(bytes)
    : textoUtf8;

  const doc = new DOMParser().parseFromString(html, "text/html");

  function limparTexto(valor) {
    return String(valor ?? "")
      .replace(/\u00A0/g, " ")
      .replace(/\uFFFD/g, "")
      .replace(/[\u200B-\u200D\uFEFF]/g, "")
      .replace(
        /[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g,
        " "
      )
      .replace(/[{}]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function finalizarValor(valor) {
    return limparTexto(valor)
      .replace(/\s*[-–—|]\s*$/, "")
      .trim();
  }

  /*
   * Preserva cada linha e cada célula da planilha.
   */
  let linhas = Array.from(doc.querySelectorAll("tr"))
    .map(tr =>
      Array.from(tr.querySelectorAll(":scope > td, :scope > th"))
        .map(celula => limparTexto(celula.textContent))
    )
    .filter(linha => linha.some(Boolean));

  /*
   * Segurança para arquivos sem estrutura de tabela.
   */
  if (!linhas.length) {
    linhas = String(doc.body?.innerText || "")
      .split(/\r?\n/)
      .map(linha => [limparTexto(linha)])
      .filter(linha => linha.some(Boolean));
  }

  /*
   * Texto mantido para a leitura das despesas.
   * As tabulações separam corretamente as colunas.
   */
  const text = linhas
    .map(linha => linha.filter(Boolean).join("\t"))
    .join("\n");

  const FONTE_ROTULOS = [
    "Tomador",
    "CNPJ",
    "CPF",
    "Endere[cç]o",
    "Bairro",
    "CEP",
    "Cidade",
    "Estado",
    "Telefone",
    "Importador",
    "Refer[eê]ncia\\s+Cliente",
    "Processo\\s+Nr\\.?",
    "N[º°o]\\s*Processo",
    "Peso\\s+Bruto",
    "Peso\\s+Cubado",
    "N[úu]mero\\s+House",
    "Numero\\s+House",
    "House",
    "Origem",
    "Sa[íi]da",
    "Destino",
    "Navio\\s*\\/\\s*Viagem",
    "Numer[áa]rio",
    "Ag[eê]ncia",
    "Conta",
    "Data\\s+(?:de\\s+)?Emiss[aã]o",
    "Data\\s+(?:de\\s+)?Vencimento",
    "Resumo\\s+de\\s+Valores",
    "Taxa\\s+USD\\s+em",
    "Real\\s+R\\$",
    "Dados\\s+Banc[aá]rios",
    "Valores\\s+debitados"
  ].join("|");

  const regexInicioRotulo = new RegExp(
    `^(?:${FONTE_ROTULOS})\\s*:?`,
    "i"
  );

  /*
   * Impede que um campo capture os próximos.
   *
   * Exemplo:
   * Origem: NINGBO Saída: ... Destino: ...
   *
   * Retorna somente NINGBO.
   */
  function cortarNoProximoRotulo(valor) {
    let resultado = limparTexto(valor);

    if (!resultado) return "";

    const regexProximoRotulo = new RegExp(
      `(?:${FONTE_ROTULOS})\\s*:?`,
      "i"
    );

    const match = regexProximoRotulo.exec(resultado);

    if (match && match.index > 0) {
      resultado = resultado.substring(0, match.index);
    } else if (match && match.index === 0) {
      return "";
    }

    return finalizarValor(resultado);
  }

  /*
   * Procura um rótulo e retorna apenas o valor daquele campo.
   */
  function obterCampo(
    padroes,
    linhaInicial = 0,
    linhaFinal = linhas.length
  ) {
    for (
      let indiceLinha = linhaInicial;
      indiceLinha < linhaFinal;
      indiceLinha++
    ) {
      const linha = linhas[indiceLinha];

      for (
        let indiceCelula = 0;
        indiceCelula < linha.length;
        indiceCelula++
      ) {
        const celula = limparTexto(linha[indiceCelula]);

        if (!celula) continue;

        for (const padrao of padroes) {
          const match = celula.match(padrao);

          if (!match) continue;

          const restante = limparTexto(
            celula.substring(
              match.index + match[0].length
            )
          );

          const valorNaMesmaCelula =
            cortarNoProximoRotulo(restante);

          if (valorNaMesmaCelula) {
            return valorNaMesmaCelula;
          }

          /*
           * O rótulo pode estar em uma célula
           * e o valor na célula ao lado.
           */
          for (
            let proxima = indiceCelula + 1;
            proxima < linha.length;
            proxima++
          ) {
            const valorProximaCelula =
              limparTexto(linha[proxima]);

            if (!valorProximaCelula) continue;

            if (
              regexInicioRotulo.test(valorProximaCelula)
            ) {
              break;
            }

            const valor =
              cortarNoProximoRotulo(valorProximaCelula);

            if (valor) return valor;
          }
        }
      }
    }

    return "";
  }

  /*
   * Localiza exclusivamente a área do Tomador.
   * Isso impede que seja utilizado o CNPJ da Process.
   */
  const indiceTomador = linhas.findIndex(linha =>
    linha.some(celula =>
      /Tomador\s*:/i.test(celula)
    )
  );

  const inicioTomador =
    indiceTomador >= 0 ? indiceTomador : 0;

  const fimTomador =
    indiceTomador >= 0
      ? Math.min(indiceTomador + 15, linhas.length)
      : linhas.length;

  function obterNomeTomador() {
    if (indiceTomador === -1) {
      return (
        obterCampo([
          /Raz[aã]o\s+Social\s*:?\s*/i
        ]) ||
        obterCampo([
          /Importador\s*:?\s*/i
        ])
      );
    }

    /*
     * Verifica se o nome está na mesma célula:
     * Tomador: NOME DA EMPRESA
     */
    const linhaTomador = linhas[indiceTomador];

    for (const celulaOriginal of linhaTomador) {
      const celula = limparTexto(celulaOriginal);
      const match = celula.match(
        /Tomador\s*:?\s*/i
      );

      if (!match) continue;

      const nome = cortarNoProximoRotulo(
        celula.substring(
          match.index + match[0].length
        )
      );

      if (nome) return nome;
    }

    /*
     * Na sua planilha a estrutura é:
     *
     * Tomador:
     * CNPJ: 52...
     * HELDT IMPORTS LTDA
     *
     * Então procuramos a primeira linha sem rótulo
     * após o campo Tomador.
     */
    for (
      let indiceLinha = indiceTomador;
      indiceLinha < fimTomador;
      indiceLinha++
    ) {
      const linha = linhas[indiceLinha];

      for (const celulaOriginal of linha) {
        const celula = finalizarValor(celulaOriginal);

        if (!celula) continue;

        if (
          /Tomador\s*:/i.test(celula) ||
          regexInicioRotulo.test(celula)
        ) {
          continue;
        }

        /*
         * Ignora CNPJ, CPF, telefone e valores numéricos.
         */
        if (
          /^\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}$/.test(celula) ||
          /^\d{3}\.\d{3}\.\d{3}-\d{2}$/.test(celula) ||
          /^\(?\d{2}\)?\s*\d{4,5}-?\d{4}$/.test(celula) ||
          /^[\d\s.,/()-]+$/.test(celula)
        ) {
          continue;
        }

        if (
          /^(Descrição|Moeda|Valor|Dados|Resumo)/i.test(
            celula
          )
        ) {
          continue;
        }

        if (/[A-Za-zÀ-ÿ]/.test(celula)) {
          return celula;
        }
      }
    }

    return "";
  }

  const dadosTomador = {
    nome: obterNomeTomador(),

    cnpj: obterCampo(
      [/CNPJ\s*:?\s*/i],
      inicioTomador,
      fimTomador
    ),

    endereco: obterCampo(
      [/Endere[cç]o\s*:?\s*/i],
      inicioTomador,
      fimTomador
    ),

    bairro: obterCampo(
      [/Bairro\s*:?\s*/i],
      inicioTomador,
      fimTomador
    ),

    cidade: obterCampo(
      [/Cidade\s*:?\s*/i],
      inicioTomador,
      fimTomador
    ),

    telefone: obterCampo(
      [/Telefone\s*:?\s*/i],
      inicioTomador,
      fimTomador
    )
  };

  const resultado = {
    numerario: obterCampo([
      /NUMER[ÁA]RIO\s*:?\s*/i
    ]),

    despachante: {
      nome: "PROCESS LOGISTICA E COMERCIO EXTERIOR LTDA.",
      endereco:
        "Rua Alexandre Herculano - 197 - 8º ANDAR - Gonzaga",
      cidade: "Santos - SP",
      cep: "11050-031",
      cnpj: "31.747.180/0001-01"
    },

    tomador: dadosTomador,

    importador: obterCampo([
      /Importador\s*:?\s*/i
    ]),

    referenciaCliente: obterCampo([
      /Refer[eê]ncia\s+Cliente\s*:?\s*/i
    ]),

    processo: obterCampo([
      /Processo\s+Nr\.?\s*:?\s*/i,
      /N[º°o]\s*Processo\s*:?\s*/i
    ]),

    pesoBruto: obterCampo([
      /Peso\s+Bruto\s*:?\s*/i
    ]),

    pesoCubado: obterCampo([
      /Peso\s+Cubado\s*:?\s*/i
    ]),

    house: obterCampo([
      /N[úu]mero\s+House\s*:?\s*/i,
      /Numero\s+House\s*:?\s*/i,
      /\bHouse\s*:?\s*/i
    ]),

    origem: obterCampo([
      /Origem\s*:?\s*/i
    ]),

    saida: obterCampo([
      /Sa[íi]da\s*:?\s*/i
    ]),

    destino: obterCampo([
      /Destino\s*:?\s*/i
    ]),

    navioViagem: obterCampo([
      /Navio\s*\/\s*Viagem\s*:?\s*/i
    ]),

    despesas: readDespesas(text),

    banco: {
      banco: "ITAU - 341",

      agencia: obterCampo([
        /Ag[eê]ncia\s*:?\s*/i
      ]),

      conta:
        obterCampo([
          /Conta\s*:?\s*/i
        ]) ||
        getContaBancaria(text),

      pix: "CNPJ 31.747.180/0001-01"
    },

    dataEmissao: obterCampo([
      /Data\s+(?:de\s+)?Emiss[aã]o\s*:?\s*/i
    ]),

    dataVencimento: obterCampo([
      /Data\s+(?:de\s+)?Vencimento\s*:?\s*/i
    ])
  };

  console.log("DADOS EXTRAÍDOS:", resultado);

  return resultado;
}

    function getContaBancaria(text) {
      const linhas = text.split("\n").map(l => l.trim());

      const linhaConta = linhas.find(linha =>
        /^Conta:/i.test(linha)
      );

      if (!linhaConta) return "";

      return linhaConta
        .replace(/^Conta:\s*/i, "")
        .replace(/[{}]/g, "")
        .trim();
    }

    function readDespesas(text) {
      const inicio = text.search(/Valores debitados na conta do Despachante/i);
      const fim = text.search(/Dados bancários/i);

      if (inicio === -1) return [];

      const bloco = text.substring(inicio, fim > inicio ? fim : text.length);

      const regex = /(.+?)\s+(BRL|USD)\s+([\d.,]+)\s+([\d.,]+)\s+([\d.,]+)/gi;

      const despesas = [];
      let match;

      while ((match = regex.exec(bloco)) !== null) {
        let descricao = match[1]
          .replace(/Valores debitados na conta do Despachante/gi, "")
          .replace(/Descrição/gi, "")
          .replace(/Moeda/gi, "")
          .replace(/Valor na Moeda/gi, "")
          .replace(/Taxa/gi, "")
          .replace(/Valor em Reais/gi, "")
          .trim();

        if (!descricao || /total/i.test(descricao)) continue;

        despesas.push({
          descricao: descricao,
          moeda: match[2],
          valorMoeda: match[3],
          taxa: match[4],
          valorReais: match[5]
        });
      }

      return despesas;
    }

    function moedaParaNumero(valor) {
      return Number(
        String(valor)
          .replace(/\./g, "")
          .replace(",", ".")
      ) || 0;
    }

    function numeroParaMoeda(valor) {
      return valor.toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function aplicarRepasse(data) {
      const novoData = structuredClone(data);
      const tipo = tipoRepasse.value;

      let valores = {};

      if (tipo === "P1") {
        valores = {
          "Despesas Desembaraço": 1534,
          "Armazenagem": 850,
          "Desembaraço Aduaneiro": 850,
          "Taxa de Handling": 3766
        };
      }

      if (tipo === "P2") {
        valores = {
          "Despesas Desembaraço": 1723,
          "Armazenagem": 270,
          "Desembaraço Aduaneiro": 473,
          "Taxa de Handling": 2534
        };
      }

      if (tipo === "EXTRA") {
        const totalExtra = Number(valorExtra.value || 0);

        valores = {
          "Despesas Desembaraço": totalExtra * 0.2191428571,
          "Armazenagem": totalExtra * 0.1214285714,
          "Desembaraço Aduaneiro": totalExtra * 0.1214285714,
          "Taxa de Handling": totalExtra * 0.538
        };
      }

      Object.entries(valores).forEach(([descricao, valor]) => {
        const existente = novoData.despesas.find(item =>
          normalizarTexto(item.descricao) === normalizarTexto(descricao)
        );

        if (existente) {
          const atual = moedaParaNumero(existente.valorReais);
          const novoValor = atual + valor;

          existente.valorMoeda = numeroParaMoeda(novoValor);
          existente.valorReais = numeroParaMoeda(novoValor);
        } else {
          novoData.despesas.push({
            descricao,
            moeda: "BRL",
            valorMoeda: numeroParaMoeda(valor),
            taxa: "1,00000",
            valorReais: numeroParaMoeda(valor)
          });
        }
      });

      ordenarDespesas(novoData.despesas);

      return novoData;
    }

    function normalizarTexto(texto) {
      return String(texto)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\./g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function ordenarDespesas(despesas) {
      const ordemTaxas = [
        /^II$/,
        /^IPI$/,
        /^PIS/,
        /^COFINS/,
        /^ICMS$/,
        /^AFRMM$/,
        /SISCOMEX/,
        /ARMAZENAGEM/,
        /TRANSPORTE RODOVIARIO|TRANSP RODOVIARIO/,
        /EMISSAO DE NFE|EMISSAO NF/,
        /DESPESAS DESEMBARACO/,
        /DESEMBARACO ADUANEIRO/,
        /TAXA DE HANDLING/
      ];

      despesas.sort((a, b) => {
        const nomeA = normalizarTexto(a.descricao);
        const nomeB = normalizarTexto(b.descricao);

        const indexA = ordemTaxas.findIndex(regex => regex.test(nomeA));
        const indexB = ordemTaxas.findIndex(regex => regex.test(nomeB));

        if (indexA === -1 && indexB === -1) return 0;
        if (indexA === -1) return 1;
        if (indexB === -1) return -1;

        return indexA - indexB;
      });
    }
