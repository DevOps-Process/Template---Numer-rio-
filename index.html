<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Numerário</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eee;
      margin: 0;
      padding: 20px;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, select, input {
      padding: 8px;
    }

    #printArea {
      width: 794px;
      background: white;
      margin: auto;
      padding: 12px;
      box-sizing: border-box;
    }

    #glossarioRepasse {
      width: 794px;
      margin: 0 auto 15px auto;
      background: #fff;
      border: 1px solid #999;
      padding: 10px;
      box-sizing: border-box;
      font-size: 12px;
    }

    #glossarioRepasse table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    #glossarioRepasse th {
      background: #000;
      color: #fff;
    }

    .section {
      margin-top: 14px;
      border: 1px solid #999;
    }

    .section-title {
      background: #111;
      color: white;
      font-weight: bold;
      padding: 5px;
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    td, th {
      border: 1px solid #999;
      padding: 4px;
    }

    th {
      background: #eee;
    }

    .right {
      text-align: right;
    }

    .center {
      text-align: center;
    }

    .text-small {
      font-size: 10px;
      line-height: 1.4;
    }

    .linha-total-amarela {
      background: #f2b400;
      margin-top: 5px;
      padding: 5px 10px;
      font-weight: bold;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 4mm;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      html, body {
        width: 210mm;
        height: 297mm;
        margin: 0;
        padding: 0;
        background: white;
      }

      .controls,
      #glossarioRepasse {
        display: none !important;
      }

      #printArea {
        width: 202mm;
        margin: 0 auto;
        padding: 0;
        min-height: auto;
      }

      .section {
        margin-top: 5px;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      table {
        font-size: 8.5px;
      }

      td, th {
        padding: 2px;
      }

      .text-small {
        font-size: 7.5px;
        line-height: 1.15;
      }

      .header-img {
        width: 100% !important;
        height: auto !important;
        max-height: none !important;
        display: block;
      }
    }
  </style>
</head>

<body>

  <div class="controls">
    <input type="file" id="fileInput" accept=".xls,.xlsx" />

    <select id="tipoRepasse">
      <option value="">Selecione o tipo</option>
      <option value="P1">P1</option>
      <option value="P2">P2+</option>
      <option value="EXTRA">Extra</option>
    </select>

    <input
      type="number"
      id="valorExtra"
      placeholder="Valor extra"
      step="0.01"
      style="display:none;"
    />

    <button onclick="window.print()">Imprimir / Salvar PDF</button>
  </div>

  <div id="glossarioRepasse" style="display:none;"></div>

  <div id="printArea">
    <p>Selecione o arquivo .xls para gerar o template.</p>
  </div>

  <!-- Leitor real de arquivos Excel .xls e .xlsx -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    const fileInput = document.getElementById("fileInput");
    const printArea = document.getElementById("printArea");
    const tipoRepasse = document.getElementById("tipoRepasse");
    const valorExtra = document.getElementById("valorExtra");
    const glossarioRepasse = document.getElementById("glossarioRepasse");

    let currentData = null;

    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        currentData = await readNumerarioFile(file);
        atualizarGlossario();
        atualizarTemplate();
      } catch (error) {
        console.error("Erro ao ler o numerário:", error);
        currentData = null;
        printArea.innerHTML = `
          <p style="color:#b00020; font-weight:bold;">
            Não foi possível ler a planilha. Verifique o arquivo e tente novamente.
          </p>
        `;
      }
    });

    tipoRepasse.addEventListener("change", () => {
      valorExtra.style.display = tipoRepasse.value === "EXTRA" ? "inline-block" : "none";
      atualizarGlossario();
      atualizarTemplate();
    });

    valorExtra.addEventListener("input", () => {
      atualizarGlossario();
      atualizarTemplate();
    });

    function atualizarTemplate() {
      if (!currentData) return;

      const dataComRepasse = aplicarRepasse(currentData);
      printArea.innerHTML = renderNumerarioTemplate(dataComRepasse);
    }

    function atualizarGlossario() {
      const tipo = tipoRepasse.value;

      if (!tipo) {
        glossarioRepasse.style.display = "none";
        glossarioRepasse.innerHTML = "";
        return;
      }

      let titulo = "";
      let valores = {};

      if (tipo === "P1") {
        titulo = "Distribuição P1";
        valores = {
          "Despesas Desembaraço": 1534,
          "Armazenagem": 850,
          "Desembaraço Aduaneiro": 850,
          "Taxa de Handling": 3766
        };
      }

      if (tipo === "P2") {
        titulo = "Distribuição P2+";
        valores = {
          "Despesas Desembaraço": 1723,
          "Armazenagem": 270,
          "Desembaraço Aduaneiro": 473,
          "Taxa de Handling": 2534
        };
      }

      if (tipo === "EXTRA") {
        const totalExtra = Number(valorExtra.value || 0);

        titulo = "Distribuição Extra";
        valores = {
          "Despesas Desembaraço": totalExtra * 0.2191428571,
          "Armazenagem": totalExtra * 0.1214285714,
          "Desembaraço Aduaneiro": totalExtra * 0.1214285714,
          "Taxa de Handling": totalExtra * 0.538
        };
      }

      const total = Object.values(valores).reduce((acc, valor) => acc + valor, 0);

      const linhas = Object.entries(valores).map(([descricao, valor]) => `
        <tr>
          <td>${descricao}</td>
          <td class="right">R$ ${numeroParaMoeda(valor)}</td>
        </tr>
      `).join("");

      glossarioRepasse.style.display = "block";
      glossarioRepasse.innerHTML = `
        <b>${titulo}</b>
        <table>
          <tr>
            <th>Descrição</th>
            <th>Valor</th>
          </tr>
          ${linhas}
          <tr>
            <td><b>Total</b></td>
            <td class="right"><b>R$ ${numeroParaMoeda(total)}</b></td>
          </tr>
        </table>
      `;
    }

    async function readNumerarioFile(file) {
      if (typeof XLSX === "undefined") {
        throw new Error("A biblioteca XLSX não foi carregada.");
      }

      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, {
        type: "array",
        cellDates: true
      });

      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];

      if (!sheet) {
        throw new Error("A planilha não possui nenhuma aba legível.");
      }

      const rawRows = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: "",
        raw: true
      });

      const textRows = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: "",
        raw: false,
        dateNF: "dd/mm/yyyy"
      });

      function limpar(valor) {
        return String(valor ?? "")
          .replace(/\u00A0/g, " ")
          .replace(/[{}]/g, "")
          .replace(/\s+/g, " ")
          .trim();
      }

      function normalizar(valor) {
        return limpar(valor)
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toUpperCase();
      }

      function escaparRegex(valor) {
        return String(valor).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function textoCelula(linha, coluna) {
        return limpar(textRows[linha]?.[coluna]);
      }

      function valorBruto(linha, coluna) {
        return rawRows[linha]?.[coluna] ?? "";
      }

      function acharRotulo(rotulos, inicio = 0, fim = textRows.length) {
        const lista = Array.isArray(rotulos) ? rotulos : [rotulos];

        for (let linha = inicio; linha < Math.min(fim, textRows.length); linha++) {
          for (let coluna = 0; coluna < (textRows[linha]?.length || 0); coluna++) {
            const conteudo = textoCelula(linha, coluna);
            if (!conteudo) continue;

            for (const rotulo of lista) {
              const regex = new RegExp(`^${escaparRegex(rotulo)}\\s*:?`, "i");
              if (regex.test(conteudo)) {
                return { linha, coluna, conteudo, rotulo, regex };
              }
            }
          }
        }

        return null;
      }

      function valorDepoisDoRotulo(rotulos, inicio = 0, fim = textRows.length) {
        const encontrado = acharRotulo(rotulos, inicio, fim);
        if (!encontrado) return "";

        const restante = limpar(encontrado.conteudo.replace(encontrado.regex, ""));
        if (restante) return restante;

        for (let coluna = encontrado.coluna + 1; coluna < (textRows[encontrado.linha]?.length || 0); coluna++) {
          const aoLado = textoCelula(encontrado.linha, coluna);
          if (aoLado) return aoLado;
        }

        for (let linha = encontrado.linha + 1; linha < Math.min(encontrado.linha + 8, fim); linha++) {
          const abaixo = textoCelula(linha, encontrado.coluna);
          if (abaixo) return abaixo;
        }

        return "";
      }

      function getNomeTomador() {
        const tomador = acharRotulo(["Tomador"]);
        if (!tomador) return "";

        const importador = acharRotulo(["Importador"], tomador.linha + 1);
        const fim = importador ? importador.linha : Math.min(tomador.linha + 12, textRows.length);

        const nomeNaMesmaCelula = limpar(
          tomador.conteudo.replace(/^Tomador\s*:?\s*/i, "")
        );

        if (nomeNaMesmaCelula) return nomeNaMesmaCelula;

        const rotulosIgnorados = [
          "CNPJ", "CPF", "ENDERECO", "BAIRRO", "CEP",
          "CIDADE", "ESTADO", "TELEFONE"
        ];

        for (let linha = tomador.linha + 1; linha < fim; linha++) {
          for (let coluna = 0; coluna < (textRows[linha]?.length || 0); coluna++) {
            const candidato = textoCelula(linha, coluna);
            if (!candidato) continue;

            const normalizado = normalizar(candidato);
            const ehRotulo = rotulosIgnorados.some(rotulo =>
              normalizado === rotulo || normalizado.startsWith(`${rotulo}:`)
            );

            if (ehRotulo) continue;
            if (/^[\d\s.,/()\-]+$/.test(candidato)) continue;

            return candidato;
          }
        }

        return "";
      }

      function campoTomador(rotulos) {
        const tomador = acharRotulo(["Tomador"]);
        if (!tomador) return "";

        const importador = acharRotulo(["Importador"], tomador.linha + 1);
        const fim = importador ? importador.linha : Math.min(tomador.linha + 12, textRows.length);

        return valorDepoisDoRotulo(rotulos, tomador.linha + 1, fim);
      }

      function numeroPlanilha(linha, coluna) {
        const bruto = valorBruto(linha, coluna);

        if (typeof bruto === "number") return bruto;

        return moedaParaNumero(bruto);
      }

      function formatarNumero(valor, casasMaximas = 3) {
        const numero = Number(valor);
        if (!Number.isFinite(numero)) return limpar(valor);

        return numero.toLocaleString("pt-BR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: casasMaximas
        });
      }

      function lerValorAbaixoDoRotulo(rotulos, formatarComoNumero = false) {
        const encontrado = acharRotulo(rotulos);
        if (!encontrado) return "";

        for (let linha = encontrado.linha + 1; linha < Math.min(encontrado.linha + 8, textRows.length); linha++) {
          const texto = textoCelula(linha, encontrado.coluna);
          if (!texto) continue;

          if (formatarComoNumero) {
            return formatarNumero(numeroPlanilha(linha, encontrado.coluna));
          }

          return texto;
        }

        return "";
      }

      function lerDespesasExcel() {
        const cabecalho = acharRotulo(["Descrição", "Descricao"]);
        if (!cabecalho) return [];

        const despesas = [];

        for (let linha = cabecalho.linha + 1; linha < textRows.length; linha++) {
          const descricao = textoCelula(linha, 0);
          const moeda = textoCelula(linha, 1).toUpperCase();

          if (/^TOTAL\s*:?$/i.test(descricao) || /^DADOS BANCARIOS/i.test(normalizar(descricao))) {
            break;
          }

          if (!descricao || !["BRL", "USD"].includes(moeda)) continue;

          const valorMoeda = numeroPlanilha(linha, 2);
          const taxa = numeroPlanilha(linha, 3);
          const valorReais = numeroPlanilha(linha, 4);

          despesas.push({
            descricao,
            moeda,
            valorMoeda: numeroParaMoeda(valorMoeda),
            taxa: Number(taxa || 0).toLocaleString("pt-BR", {
              minimumFractionDigits: 5,
              maximumFractionDigits: 5
            }),
            valorReais: numeroParaMoeda(valorReais)
          });
        }

        return despesas;
      }

      const resultado = {
        numerario: valorDepoisDoRotulo(["NUMERÁRIO", "NUMERARIO"]),

        despachante: {
          nome: "PROCESS LOGISTICA E COMERCIO EXTERIOR LTDA.",
          endereco: "Rua Alexandre Herculano - 197 - 8º ANDAR - Gonzaga",
          cidade: "Santos - SP",
          cep: "11050-031",
          cnpj: "31.747.180/0001-01"
        },

        tomador: {
          nome: getNomeTomador(),
          cnpj: campoTomador(["CNPJ"]),
          endereco: campoTomador(["Endereço", "Endereco"]),
          bairro: campoTomador(["Bairro"]),
          cidade: campoTomador(["Cidade"]),
          telefone: campoTomador(["Telefone"])
        },

        importador: lerValorAbaixoDoRotulo(["Importador"]),
        referenciaCliente: lerValorAbaixoDoRotulo(["Referencia Cliente", "Referência Cliente"]),
        processo: lerValorAbaixoDoRotulo(["Processo Nr.", "Processo Nr", "Nº Processo"]),
        pesoBruto: lerValorAbaixoDoRotulo(["Peso bruto", "Peso Bruto"], true),
        pesoCubado: lerValorAbaixoDoRotulo(["Peso Cubado"], true),
        house: lerValorAbaixoDoRotulo(["Número House", "Numero House", "House"]),
        origem: lerValorAbaixoDoRotulo(["Origem"]),
        saida: lerValorAbaixoDoRotulo(["Saída", "Saida"]),
        destino: lerValorAbaixoDoRotulo(["Destino"]),
        navioViagem: lerValorAbaixoDoRotulo(["Navio / Viagem", "Navio/Viagem"]),

        despesas: lerDespesasExcel(),

        banco: {
          banco: valorDepoisDoRotulo(["Banco"]),
          agencia: valorDepoisDoRotulo(["Agência", "Agencia"]),
          conta: valorDepoisDoRotulo(["Conta"]),
          pix: valorDepoisDoRotulo(["Chave PIX CNPJ", "Chave PIX", "PIX"])
        },

        dataEmissao: valorDepoisDoRotulo(["Data Emissão", "Data Emissao"]),
        dataVencimento: valorDepoisDoRotulo(["Data Vencimento"])
      };

      console.log("DADOS EXTRAÍDOS CORRETAMENTE:", resultado);
      return resultado;
    }

    function moedaParaNumero(valor) {
      if (typeof valor === "number") return valor;

      return Number(
        String(valor)
          .replace(/\./g, "")
          .replace(",", ".")
      ) || 0;
    }

    function numeroParaMoeda(valor) {
      return Number(valor || 0).toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function aplicarRepasse(data) {
      const novoData = structuredClone(data);
      const tipo = tipoRepasse.value;

      let valores = {};

      if (tipo === "P1") {
        valores = {
          "Despesas Desembaraço": 1534,
          "Armazenagem": 850,
          "Desembaraço Aduaneiro": 850,
          "Taxa de Handling": 3766
        };
      }

      if (tipo === "P2") {
        valores = {
          "Despesas Desembaraço": 1723,
          "Armazenagem": 270,
          "Desembaraço Aduaneiro": 473,
          "Taxa de Handling": 2534
        };
      }

      if (tipo === "EXTRA") {
        const totalExtra = Number(valorExtra.value || 0);

        valores = {
          "Despesas Desembaraço": totalExtra * 0.2191428571,
          "Armazenagem": totalExtra * 0.1214285714,
          "Desembaraço Aduaneiro": totalExtra * 0.1214285714,
          "Taxa de Handling": totalExtra * 0.538
        };
      }

      Object.entries(valores).forEach(([descricao, valor]) => {
        const existente = novoData.despesas.find(item =>
          normalizarTexto(item.descricao) === normalizarTexto(descricao)
        );

        if (existente) {
          const atual = moedaParaNumero(existente.valorReais);
          const novoValor = atual + valor;

          existente.valorMoeda = numeroParaMoeda(novoValor);
          existente.valorReais = numeroParaMoeda(novoValor);
        } else {
          novoData.despesas.push({
            descricao,
            moeda: "BRL",
            valorMoeda: numeroParaMoeda(valor),
            taxa: "1,00000",
            valorReais: numeroParaMoeda(valor)
          });
        }
      });

      ordenarDespesas(novoData.despesas);

      return novoData;
    }

    function normalizarTexto(texto) {
      return String(texto)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\./g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function ordenarDespesas(despesas) {
      const ordemTaxas = [
        /^II$/,
        /^IPI$/,
        /^PIS/,
        /^COFINS/,
        /^ICMS$/,
        /^AFRMM$/,
        /SISCOMEX/,
        /ARMAZENAGEM/,
        /TRANSPORTE RODOVIARIO|TRANSP RODOVIARIO/,
        /EMISSAO DE NFE|EMISSAO NF/,
        /DESPESAS DESEMBARACO/,
        /DESEMBARACO ADUANEIRO/,
        /TAXA DE HANDLING/
      ];

      despesas.sort((a, b) => {
        const nomeA = normalizarTexto(a.descricao);
        const nomeB = normalizarTexto(b.descricao);

        const indexA = ordemTaxas.findIndex(regex => regex.test(nomeA));
        const indexB = ordemTaxas.findIndex(regex => regex.test(nomeB));

        if (indexA === -1 && indexB === -1) return 0;
        if (indexA === -1) return 1;
        if (indexB === -1) return -1;

        return indexA - indexB;
      });
    }

    function renderNumerarioTemplate(data) {
      const despesasRows = data.despesas.map(item => {
        const valorSimulacao = moedaParaNumero(item.valorReais);

        return `
          <tr>
            <td>${item.descricao}</td>
            <td class="right">${numeroParaMoeda(valorSimulacao)}</td>
          </tr>
        `;
      }).join("");

      const totalSimulacao = data.despesas.reduce((acc, item) => {
        return acc + moedaParaNumero(item.valorReais);
      }, 0);

      return `
        <div style="width:100%; margin-bottom:12px; position:relative; min-height:120px;">
          <img 
            src="cabecalho.png" 
            class="header-img"
            style="width:100%; max-height:120px; object-fit:contain; display:block;"
          >
        </div>

        <div class="section">
          <table>
            <tr>
              <th>Nº PROCESSO</th>
              <th>CLIENTE</th>
              <th>REFERÊNCIA</th>
              <th>DESTINO</th>
              <th>SAÍDA</th>
            </tr>
            <tr>
              <td>${data.processo}</td>
              <td>${data.tomador.nome || data.importador}</td>
              <td>${data.referenciaCliente}</td>
              <td>${data.destino}</td>
              <td>${data.saida}</td>
            </tr>
          </table>
        </div>

        <div class="section">
          <div class="section-title">DADOS DA CARGA</div>
          <table>
            <tr>
              <td><b>House:</b> ${data.house}</td>
              <td><b>Origem:</b> ${data.origem}</td>
              <td><b>Navio / Viagem:</b> ${data.navioViagem}</td>
            </tr>
            <tr>
              <td><b>Peso Bruto:</b> ${data.pesoBruto}</td>
              <td><b>Peso Cubado:</b> ${data.pesoCubado}</td>
              <td><b>Numerário:</b> ${data.numerario}</td>
            </tr>
          </table>
        </div>

        <div class="section">
          <div class="section-title">DADOS DO CLIENTE</div>
          <table>
            <tr><td><b>Cliente:</b> ${data.tomador.nome}</td></tr>
            <tr><td><b>CNPJ:</b> ${data.tomador.cnpj}</td></tr>
            <tr><td><b>Endereço:</b> ${data.tomador.endereco}</td></tr>
            <tr><td><b>Bairro:</b> ${data.tomador.bairro}</td></tr>
            <tr><td><b>Cidade:</b> ${data.tomador.cidade}</td></tr>
            <tr><td><b>Telefone:</b> ${data.tomador.telefone}</td></tr>
          </table>
        </div>

        <div class="section" style="padding-bottom:0;">
          <table>
            <tr>
              <th style="background:#000; color:#fff;">Descrição</th>
              <th style="background:#000; color:#fff;">Valor Importação</th>
            </tr>
            ${despesasRows}
          </table>

          <div class="linha-total-amarela">
            <span>TOTAL DO NUMERÁRIO</span>
            <span>R$ ${numeroParaMoeda(totalSimulacao)}</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">CONSIDERAÇÕES FINAIS</div>
          <div class="text-small" style="padding: 8px;">
            *Os valores são baseados de acordo com a última ressimulação enviada antes do embarque. 
            A diferença para mais ocorre por conta da variação cambial juntamente com a margem de segurança repassada pelo despachante.<br><br>

            *Nós levamos em conta fatores e despesas que podem incidir no processo de nacionalização, como: canais de parametrização diferentes de verde que podem acontecer devido a uma interpretação arbitrária do fiscal.<br><br>

            *Reduções ou isenções da margem são totalmente negociáveis visto que o numerário é apenas uma previsão.<br><br>

            *Para facilitação de localização de pagamento, recomenda-se efetuar uma única transação com o valor integral.<br><br>
